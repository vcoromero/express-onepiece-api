name: Deploy to AWS

on:
  push:
    branches: [ main, 'release/**' ]
  workflow_dispatch: # Manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci --legacy-peer-deps
      
    - name: Generate Prisma Client
      run: npx prisma generate
      
    - name: Run tests
      run: npm test
      
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
        
    - name: Install Serverless Framework
      run: npm install -g serverless@3
      
    - name: Deploy to AWS
      run: serverless deploy --stage prod
      env:
        NODE_ENV: production
        # PostgreSQL
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        # Redis (for future caching)
        REDIS_HOST: ${{ secrets.REDIS_HOST }}
        REDIS_PORT: ${{ secrets.REDIS_PORT }}
        REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        # Auth
        ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
        ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        JWT_EXPIRES_IN: ${{ secrets.JWT_EXPIRES_IN }}
        # Rate Limiting
        RATE_LIMIT_WINDOW_MS: ${{ secrets.RATE_LIMIT_WINDOW_MS }}
        RATE_LIMIT_MAX_REQUESTS: ${{ secrets.RATE_LIMIT_MAX_REQUESTS }}
        # Logging
        LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
        LOG_HTTP_REQUESTS: ${{ secrets.LOG_HTTP_REQUESTS }}
        # AWS
        AWS_REGION: ${{ secrets.AWS_REGION }}
        AWS_SECRETS_MANAGER_ARN: ${{ secrets.AWS_SECRETS_MANAGER_ARN }}