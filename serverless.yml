service: onepiece-api

frameworkVersion: '3'

plugins:
  - serverless-dotenv-plugin

custom:
  dotenv:
    path: .env
    include:
      - DATABASE_URL
      - JWT_SECRET
      - JWT_EXPIRES_IN
      - RATE_LIMIT_WINDOW_MS
      - RATE_LIMIT_MAX_REQUESTS
      - RATE_LIMIT_LOGIN_MAX
      - LOG_LEVEL
      - LOG_HTTP_REQUESTS
      - NODE_ENV
    required:
      env:
        - DATABASE_URL
        - JWT_SECRET

provider:
  name: aws
  runtime: nodejs20.x
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'us-east-1'}
  memorySize: 512
  timeout: 29
  httpApi:
    cors: true
  environment:
    NODE_ENV: production
    JWT_EXPIRES_IN: 24h
    RATE_LIMIT_WINDOW_MS: '900000'
    RATE_LIMIT_MAX_REQUESTS: '100'
    RATE_LIMIT_LOGIN_MAX: '5'
    LOG_LEVEL: info
    LOG_HTTP_REQUESTS: 'false'

package:
  # Only production dependencies; devDependencies (jest, serverless, prisma CLI, etc.) must not ship.
  excludeDevDependencies: true
  patterns:
    - '!**/__tests__/**'
    - '!**/*.test.js'
    - '!bruno/**'
    - '!coverage/**'
    - '!.env'
    - '!.env.*'
    - '!docs/**'
    - '!.git/**'
    - 'prisma/schema.prisma'
    # Often hoisted though unused at runtime (SDK v2 is huge; Lambda runtime does not need this in the zip)
    - '!node_modules/aws-sdk/**'
    # Prisma CLI / Studio — must not be required by Lambda (safety if hoisted into the zip)
    - '!node_modules/prisma/**'
    - '!node_modules/@prisma/studio-core/**'
    - '!node_modules/@prisma/dev/**'
    # Local generate often produces a second engine; Lambda (Amazon Linux 2023) uses only rhel-openssl-3.0.x
    - '!node_modules/.prisma/client/libquery_engine-debian-openssl-3.0.x.so.node'
    - '!node_modules/.prisma/client/libquery_engine-darwin*'
    - '!node_modules/.prisma/client/libquery_engine-linux-musl*'

functions:
  api:
    handler: src/lambda.handler
    events:
      - httpApi:
          path: /
          method: ANY
      - httpApi:
          path: /{proxy+}
          method: ANY
