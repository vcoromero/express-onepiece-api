service: onepiece-api

frameworkVersion: '3'

plugins:
  - serverless-dotenv-plugin

custom:
  dotenv:
    path: .env
    include:
      - DATABASE_URL
      - JWT_SECRET
      - JWT_EXPIRES_IN
      - ADMIN_USERNAME
      - ADMIN_PASSWORD_HASH
      - RATE_LIMIT_WINDOW_MS
      - RATE_LIMIT_MAX_REQUESTS
      - RATE_LIMIT_LOGIN_MAX
      - LOG_LEVEL
      - LOG_HTTP_REQUESTS
      - NODE_ENV
    required:
      env:
        - DATABASE_URL
        - JWT_SECRET
        - ADMIN_USERNAME
        - ADMIN_PASSWORD_HASH

provider:
  name: aws
  runtime: nodejs20.x
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'us-east-1'}
  memorySize: 512
  timeout: 29
  httpApi:
    cors: true
  environment:
    NODE_ENV: production
    JWT_EXPIRES_IN: 24h
    RATE_LIMIT_WINDOW_MS: '900000'
    RATE_LIMIT_MAX_REQUESTS: '100'
    RATE_LIMIT_LOGIN_MAX: '5'
    LOG_LEVEL: info
    LOG_HTTP_REQUESTS: 'false'

package:
  patterns:
    - '!**/__tests__/**'
    - '!**/*.test.js'
    - '!bruno/**'
    - '!coverage/**'
    - '!.env'
    - '!.env.*'
    - 'prisma/schema.prisma'

functions:
  api:
    handler: src/lambda.handler
    events:
      - httpApi:
          path: /
          method: ANY
      - httpApi:
          path: /{proxy+}
          method: ANY
